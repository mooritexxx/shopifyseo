name: Bug report
description: Report something that does not work as documented
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report an issue. Please include enough detail to reproduce the problem.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong, in one or two sentences?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps, including what you clicked or which API you called.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Commit or version
      description: Git SHA, tag, or "main @ date"
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, Node version, browser (if UI-related). How do you run the app (e.g. `./start_app.sh`, uvicorn only)?
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Redact secrets and tokens.
